<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend Board 🏕️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f5f0;--surface:#fff;--surface2:#f0ede6;--border:rgba(0,0,0,0.09);
  --text:#1a1814;--muted:#6b6760;--faint:#b0ada8;
  --green:#2d7a4f;--green-light:#e8f5ee;--green-hover:#235f3d;
  --blue:#1e5f9e;--blue-light:#e6f0fb;
  --orange:#b85c00;--orange-light:#fef3e6;
  --violet:#6b3fa0;--violet-light:#f3edfb;
  --gold:#c9920a;--radius:1rem;--shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
[data-theme=dark]{
  --bg:#14120e;--surface:#1c1a15;--surface2:#22201a;--border:rgba(255,255,255,0.09);
  --text:#e5e2db;--muted:#908d86;--faint:#555250;
  --green:#4aaa72;--green-light:#1a2e22;--green-hover:#3d9460;
  --blue:#5b9dd4;--blue-light:#162038;
  --orange:#e07b20;--orange-light:#2a1a08;
  --violet:#a87ed4;--violet-light:#1e1228;
  --shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
img{display:block;max-width:100%}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.nav-right{display:flex;align-items:center;gap:.75rem}
.btn-add{background:var(--green);color:#fff;padding:.45rem 1.1rem;border-radius:2rem;font-size:.85rem;font-weight:600;transition:background .18s}
.btn-add:hover{background:var(--green-hover)}
.btn-theme{padding:.4rem;border-radius:2rem;border:1.5px solid var(--border);display:flex;align-items:center;transition:background .18s}
.btn-theme:hover{background:var(--surface2)}
.hero{background:linear-gradient(135deg,#2d7a4f 0%,#1e5f9e 100%);color:#fff;padding:2.5rem 1.5rem 3rem;text-align:center}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:.5rem}
.hero p{opacity:.85;font-size:1rem;max-width:44ch;margin:0 auto}
.filters{max-width:1100px;margin:0 auto;padding:1.75rem 1.5rem .5rem;display:flex;gap:.6rem;flex-wrap:wrap}
.filter-btn{padding:.5rem 1.1rem;border-radius:2rem;border:1.5px solid var(--border);font-size:.85rem;font-weight:500;background:var(--surface);transition:all .18s;white-space:nowrap}
.filter-btn:hover{background:var(--surface2)}
.filter-btn.active[data-filter="all"],.filter-btn[data-filter="all"]:hover{border-color:var(--green);background:var(--green-light);color:var(--green)}
.filter-btn.active[data-filter="trekking"],.filter-btn[data-filter="trekking"]:hover{border-color:var(--green);background:var(--green-light);color:var(--green)}
.filter-btn.active[data-filter="trekking-medio"],.filter-btn[data-filter="trekking-medio"]:hover{border-color:var(--orange);background:var(--orange-light);color:var(--orange)}
.filter-btn.active[data-filter="bici"],.filter-btn[data-filter="bici"]:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.filter-btn.active[data-filter="picnic"],.filter-btn[data-filter="picnic"]:hover{border-color:var(--violet);background:var(--violet-light);color:var(--violet)}
.grid{max-width:1100px;margin:0 auto;padding:1rem 1.5rem 3rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem}
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.card-img{aspect-ratio:16/9;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .card-img img{transform:scale(1.04)}
.cat-badge{position:absolute;top:.7rem;left:.7rem;padding:.25rem .65rem;border-radius:2rem;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;backdrop-filter:blur(8px)}
.badge-trekking{background:rgba(45,122,79,.85);color:#fff}
.badge-trekking-medio{background:rgba(184,92,0,.85);color:#fff}
.badge-bici{background:rgba(30,95,158,.85);color:#fff}
.badge-picnic{background:rgba(107,63,160,.85);color:#fff}
.card-body{padding:1rem 1.1rem 1.1rem}
.card-cat{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:.3rem}
.text-trekking{color:var(--green)}
.text-trekking-medio{color:var(--orange)}
.text-bici{color:var(--blue)}
.text-picnic{color:var(--violet)}
.card-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;line-height:1.3;margin-bottom:.35rem}
.card-desc{font-size:.82rem;color:var(--muted);line-height:1.55;margin-bottom:.75rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-meta{display:flex;gap:.5rem;flex-wrap:wrap}
.tag{font-size:.7rem;padding:.2rem .55rem;background:var(--surface2);border-radius:2rem;color:var(--muted)}
.like-btn{display:flex;align-items:center;gap:.4rem;padding:.35rem .85rem;border-radius:2rem;border:1.5px solid var(--border);font-size:.85rem;font-weight:600;transition:all .18s;background:var(--surface)}
.like-btn:hover{border-color:#e55;background:#fff0f0}
.like-btn.liked{border-color:#e55;background:#fff0f0;color:#e55}
.like-btn .heart{font-size:.95rem;transition:transform .15s}
.like-btn:active .heart{transform:scale(1.4)}
.empty{text-align:center;padding:4rem 1.5rem;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:3rem;margin-bottom:1rem}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:1.5rem;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);position:relative}
.modal-img{aspect-ratio:16/9;overflow:hidden;border-radius:1.5rem 1.5rem 0 0}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-body{padding:1.5rem}
.modal-cat{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:.35rem}
.modal-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;margin-bottom:.6rem}
.modal-desc{color:var(--muted);font-size:.92rem;line-height:1.7;margin-bottom:1rem}
.modal-info{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem}
.info-chip{display:flex;align-items:center;gap:.3rem;font-size:.8rem;padding:.3rem .7rem;background:var(--surface2);border-radius:2rem;color:var(--muted)}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.25rem}
.gallery img{border-radius:.5rem;aspect-ratio:4/3;object-fit:cover;width:100%;cursor:pointer;transition:opacity .18s}
.gallery img:hover{opacity:.82}
.modal-actions{display:flex;gap:.75rem}
.modal-like{flex:1;padding:.7rem;border-radius:2rem;font-weight:600;font-size:.9rem;border:1.5px solid var(--border);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.modal-like:hover,.modal-like.liked{border-color:#e55;background:#fff0f0;color:#e55}
.modal-maps{flex:1;padding:.7rem;border-radius:2rem;font-weight:600;font-size:.9rem;background:var(--green);color:#fff;text-align:center;display:flex;align-items:center;justify-content:center;gap:.4rem;transition:background .18s}
.modal-maps:hover{background:var(--green-hover)}
.close-btn{position:absolute;top:.9rem;right:.9rem;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border-radius:2rem;padding:.4rem;display:flex;box-shadow:var(--shadow);transition:background .18s}
.close-btn:hover{background:#fff}
.form-modal{background:var(--surface);border-radius:1.5rem;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding:1.75rem}
.form-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:1.25rem}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
.field label{font-size:.82rem;font-weight:600;color:var(--muted)}
.field input,.field textarea,.field select{border:1.5px solid var(--border);border-radius:.6rem;padding:.6rem .85rem;font:inherit;font-size:.9rem;background:var(--bg);color:var(--text);outline:none;transition:border-color .18s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green)}
.field textarea{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:.75rem;margin-top:1.25rem}
.btn-submit{flex:1;padding:.7rem;border-radius:2rem;background:var(--green);color:#fff;font-weight:600;font-size:.9rem;transition:background .18s}
.btn-submit:hover{background:var(--green-hover)}
.btn-cancel{flex:1;padding:.7rem;border-radius:2rem;border:1.5px solid var(--border);font-weight:600;font-size:.9rem;transition:background .18s}
.btn-cancel:hover{background:var(--surface2)}
@media(max-width:500px){
  nav{padding:0 1rem}
  .grid{padding:1rem 1rem 3rem}
  .filters{padding:1.5rem 1rem .5rem}
}
</style>
</head>
<body>

<nav>
  <div class="logo">🏕️ Weekend Board</div>
  <div class="nav-right">
    <button class="btn-add" onclick="openAddForm()">+ Aggiungi idea</button>
    <button class="btn-theme" data-theme-toggle aria-label="Tema">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</nav>

<div class="hero">
  <h1>Idee per il weekend 🌿</h1>
  <p>Scopri, vota le idee migliori e pianifica il prossimo weekend con il gruppo</p>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">🗺️ Tutte</button>
  <button class="filter-btn" data-filter="trekking">🥾 Trekking facili</button>
  <button class="filter-btn" data-filter="trekking-medio">🏔️ Trekking medi</button>
  <button class="filter-btn" data-filter="bici">🚲 Giri in bici</button>
  <button class="filter-btn" data-filter="picnic">🧺 Pic-nic</button>
</div>

<div class="grid" id="grid"></div>

<!-- CARD MODAL -->
<div class="overlay" id="cardOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('cardOverlay')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-img"><img id="mImg" src="" alt=""></div>
    <div class="modal-body">
      <div class="modal-cat" id="mCat"></div>
      <h2 class="modal-title" id="mTitle"></h2>
      <p class="modal-desc" id="mDesc"></p>
      <div class="modal-info" id="mInfo"></div>
      <div class="gallery" id="mGallery"></div>
      <div class="modal-actions">
        <button class="modal-like" id="mLikeBtn" onclick="toggleLikeModal()">❤️ <span id="mLikeCount"></span> Mi piace</button>
        <a class="modal-maps" id="mMaps" href="#" target="_blank" rel="noopener">📍 Google Maps</a>
      </div>
    </div>
  </div>
</div>

<!-- ADD FORM MODAL -->
<div class="overlay" id="addOverlay">
  <div class="form-modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <div class="form-title" style="margin:0">➕ Nuova idea</div>
      <button class="close-btn" style="position:static;box-shadow:none" onclick="closeModal('addOverlay')">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <form onsubmit="submitIdea(event)">
      <div class="field"><label>Titolo *</label><input type="text" id="fTitle" placeholder="es. Lago di Lugano in bici" required></div>
      <div class="field"><label>Categoria *</label>
        <select id="fCat" required>
          <option value="">— scegli —</option>
          <option value="trekking">🥾 Trekking facile</option>
          <option value="trekking-medio">🏔️ Trekking medio</option>
          <option value="bici">🚲 Giro in bici</option>
          <option value="picnic">🧺 Pic-nic</option>
        </select>
      </div>
      <div class="field"><label>Descrizione</label><textarea id="fDesc" placeholder="Dove si va, quanto dura, cosa si vede…"></textarea></div>
      <div class="field"><label>Distanza (es. 12 km)</label><input type="text" id="fDist" placeholder="12 km"></div>
      <div class="field"><label>Durata (es. 3h)</label><input type="text" id="fDur" placeholder="3h"></div>
      <div class="field"><label>Difficoltà</label>
        <select id="fDiff">
          <option value="">—</option>
          <option value="Facile">Facile</option>
          <option value="Media">Media</option>
          <option value="Impegnativa">Impegnativa</option>
        </select>
      </div>
      <div class="field"><label>Link Google Maps</label><input type="url" id="fMaps" placeholder="https://maps.google.com/..."></div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="closeModal('addOverlay')">Annulla</button>
        <button type="submit" class="btn-submit">✅ Aggiungi</button>
      </div>
    </form>
  </div>
</div>

let likes = {};
let currentId = null;
let activeFilter = 'all';

try {
  const saved = localStorage.getItem('wb_likes');
  if(saved) likes = JSON.parse(saved);
  const savedIdeas = localStorage.getItem('wb_ideas');
  if(savedIdeas) ideas = ideas.concat(JSON.parse(savedIdeas));
} catch(e){}

function saveLikes(){ try{ localStorage.setItem('wb_likes', JSON.stringify(likes)); }catch(e){} }

function imgUrl(src){
  if(!src) return 'https://picsum.photos/seed/default/640/360';
  if(src.startsWith('http') || src.includes('/')) return src;
  return 'https://picsum.photos/seed/'+src+'/640/360';
}

function renderGrid(){
  const filtered = ideas.filter(i => activeFilter==='all' || i.cat===activeFilter);
  const grid = document.getElementById('grid');
  if(!filtered.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">🌿</div><p>Nessuna idea qui ancora.<br>Aggiungine una!</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(idea => {
    const c = CAT[idea.cat] || CAT['trekking'];
    const liked = !!likes[idea.id];
    const likeCount = (idea.likes||0) + (liked ? 1 : 0);
    return `
    <div class="card" onclick="openCard(${idea.id})">
      <div class="card-img">
        <img src="${imgUrl(idea.img)}" alt="${idea.title}" width="640" height="360" loading="lazy">
        <div class="cat-badge ${c.badge}">${c.label}</div>
      </div>
      <div class="card-body">
        <div class="card-cat ${c.text}">${c.label}</div>
        <div class="card-title">${idea.title}</div>
        <div class="card-desc">${idea.desc}</div>
        <div class="card-footer">
          <div class="card-meta">
            ${idea.dist?`<span class="tag">📏 ${idea.dist}</span>`:''}
            ${idea.dur?`<span class="tag">⏱ ${idea.dur}</span>`:''}
            ${idea.diff?`<span class="tag">${idea.diff}</span>`:''}
          </div>
          <button class="like-btn ${liked?'liked':''}" onclick="event.stopPropagation();toggleLike(${idea.id},this)">
            <span class="heart">${liked?'❤️':'🤍'}</span>
            <span class="like-num">${likeCount}</span>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleLike(id, btn){
  likes[id] = !likes[id];
  saveLikes();
  const idea = ideas.find(i=>i.id===id);
  const count = (idea.likes||0) + (likes[id]?1:0);
  btn.querySelector('.heart').textContent = likes[id]?'❤️':'🤍';
  btn.querySelector('.like-num').textContent = count;
  btn.classList.toggle('liked', !!likes[id]);
  if(currentId===id){
    document.getElementById('mLikeBtn').classList.toggle('liked', !!likes[id]);
    document.getElementById('mLikeCount').textContent = count;
  }
}

function toggleLikeModal(){
  const btn = document.querySelector(`.card[onclick="openCard(${currentId})"] .like-btn`);
  if(btn){ toggleLike(currentId, btn); return; }
  likes[currentId] = !likes[currentId];
  saveLikes();
  const idea = ideas.find(i=>i.id===currentId);
  const count = (idea.likes||0) + (likes[currentId]?1:0);
  document.getElementById('mLikeBtn').classList.toggle('liked', !!likes[currentId]);
  document.getElementById('mLikeCount').textContent = count;
  renderGrid();
}

function openCard(id){
  const idea = ideas.find(i=>i.id===id);
  if(!idea) return;
  currentId = id;
  const c = CAT[idea.cat] || CAT['trekking'];
  const liked = !!likes[id];
  const count = (idea.likes||0) + (liked?1:0);
  document.getElementById('mImg').src = imgUrl(idea.img);
  document.getElementById('mImg').alt = idea.title;
  document.getElementById('mCat').className = 'modal-cat '+c.text;
  document.getElementById('mCat').textContent = c.label;
  document.getElementById('mTitle').textContent = idea.title;
  document.getElementById('mDesc').textContent = idea.desc;
  document.getElementById('mInfo').innerHTML = [
    idea.dist?`<span class="info-chip">📏 ${idea.dist}</span>`:'',
    idea.dur?`<span class="info-chip">⏱ ${idea.dur}</span>`:'',
    idea.diff?`<span class="info-chip">💪 ${idea.diff}</span>`:'',
    ...(idea.tags||[]).map(t=>`<span class="info-chip">${t}</span>`)
  ].join('');
  const gallery = document.getElementById('mGallery');
  if(idea.gallery && idea.gallery.length > 1){
    gallery.style.display='grid';
    gallery.innerHTML = idea.gallery.slice(1).map(f=>
      `<img src="${f}" alt="foto" loading="lazy" onclick="window.open('${f}','_blank')">`
    ).join('');
  } else {
    gallery.style.display='none';
    gallery.innerHTML='';
  }
  document.getElementById('mLikeBtn').classList.toggle('liked', liked);
  document.getElementById('mLikeCount').textContent = count;
  const a = document.getElementById('mMaps');
  if(idea.maps){ a.href=idea.maps; a.style.display='flex'; }
  else { a.style.display='none'; }
  document.getElementById('cardOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('cardOverlay').addEventListener('click',function(e){if(e.target===this)closeModal('cardOverlay');});
document.getElementById('addOverlay').addEventListener('click',function(e){if(e.target===this)closeModal('addOverlay');});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('cardOverlay');closeModal('addOverlay');}});

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.filter;
    renderGrid();
  });
});

function openAddForm(){
  document.getElementById('addOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function submitIdea(e){
  e.preventDefault();
  const title=document.getElementById('fTitle').value.trim();
  const cat=document.getElementById('fCat').value;
  if(!title||!cat) return;
  const newIdea={
    id:Date.now(), cat, title,
    desc:document.getElementById('fDesc').value.trim()||'Nessuna descrizione.',
    dist:document.getElementById('fDist').value.trim(),
    dur:document.getElementById('fDur').value.trim(),
    diff:document.getElementById('fDiff').value,
    img:cat==='trekking'?'hiking-nature-new':cat==='picnic'?'picnic-nature-new':'cycling-new-route',
    maps:document.getElementById('fMaps').value.trim(),
    tags:[], likes:0
  };
  ideas.push(newIdea);
  try{
    const saved=JSON.parse(localStorage.getItem('wb_ideas')||'[]');
    saved.push(newIdea);
    localStorage.setItem('wb_ideas',JSON.stringify(saved));
  }catch(ex){}
  closeModal('addOverlay');
  e.target.reset();
  renderGrid();
}

(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  t&&t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    t.innerHTML=d==='dark'
      ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      :'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

renderGrid();
</script>
